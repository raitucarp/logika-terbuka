si. Baskara, yang baru saja tiba dari ibu kota dengan membawa keriuhan algoritma dan efisiensi digital di kepalanya, merasa seketika menjadi asing. Baginya, rumah ini adalah sebuah anomali—sebuah tumpukan benda yang menuntut ruang namun memberikan sedikit kegunaan praktis. Ia datang dengan satu niat yang belum sempat ia ucapkan: meyakinkan pamannya untuk menjual rumah ini dan memindahkan isinya ke gudang yang lebih modern, atau mungkin membuang sebagian besar "sampah sejarah" ini demi sebuah masa depan yang lebih fungsional.`})}),(0,V.jsx)(Q,{delay:1.8,children:(0,V.jsx)(`p`,{children:`"Kau sudah sampai, Bas," sapa Pak Aris tanpa mengalihkan pandangannya dari sebuah kotak yang sedang ia bersihkan. Suaranya rendah, berwibawa, namun mengandung kehangatan yang sulit dijelaskan.`})})]})]})},Ed=()=>{let[e,t]=(0,b.useState)(!1);return(0,V.jsxs)(`section`,{className:`py-24 px-6 relative border-t border-zinc-800/50`,children:[(0,V.jsxs)(`div`,{className:`max-w-3xl mx-auto space-y-8 text-lg leading-loose font-serif-body text-zinc-300 mb-16`,children:[(0,V.jsx)(Q,{children:(0,V.jsx)(`p`,{children:`"Rumah ini masih saja terasa seperti labirin yang sesak, Paman," sahut Baskara, mencoba menyembunyikan rasa sesak di dadanya. Ia meletakkan ranselnya di atas lantai ubin yang dingin, di mana pantulan cahaya lampu minyak membentuk bayangan-bayangan panjang yang menari di dinding, seolah bayangan itu sendiri adalah penghuni rumah yang tidak kasat mata.`})}),(0,V.jsx)(Q,{children:(0,V.jsx)(`p`,{children:`Pak Aris tersenyum tenang, sebuah senyuman yang seolah menyiratkan bahwa ia tahu persis apa yang sedang berkecamuk di dalam pikiran keponakannya. "Labirin hanya terasa menyesatkan bagi mereka yang tidak mengerti hubungannya, Bas. Mari masuk lebih dalam. Ada banyak hal yang harus kau pahami sebelum kau memutuskan apa yang ingin kau lakukan dengan tempat ini."`})}),(0,V.jsx)(Q,{children:(0,V.jsx)(`p`,{children:`Mereka berjalan menyusuri lorong yang sempit, di mana setiap langkah Baskara a, perhiasan, dan ribuan kenangan lain. Namun, karena ia memiliki hal-hal yang tidak dimiliki si kecil, maka kotak kecil ini adalah sebuah fragmen yang jujur. Ia adalah bagian murni yang memungkinkan kita fokus pada saripati tanpa harus tenggelam dalam keluasan yang tak terbatas."`})})]}),(0,V.jsxs)(`div`,{className:`max-w-5xl mx-auto grid md:grid-cols-2 gap-12 items-center bg-zinc-900/50 p-8 md:p-12 rounded-2xl border border-zinc-800 shadow-xl backdrop-blur-sm`,children:[(0,V.jsxs)(Q,{className:`order-2 md:order-1`,children:[(0,V.jsx)(`div`,{className:`font-serif-heading text-3xl mb-4 text-zinc-100`,children:`Bagian dari Keseluruhan`}),(0,V.jsxs)(`p`,{className:`font-serif-body text-zinc-400 leading-relaxed mb-6`,children:[`Seperti yang diungkapkan Pak Aris, kotak kecil (`,(0,V.jsx)(`span`,{className:`text-blue-400 font-semibold`,children:`A`}),`) tidak kehilangan maknanya, melainkan menjadi `,(0,V.jsx)(wd,{term:`himpunan bagian`,math:`A \\subseteq B`,explanation:`A adalah himpunan bagian (subset) dari B jika setiap elemen di A juga merupakan elemen di B.`}),` dari Peti Induk (`,(0,V.jsx)(`span`,{className:`text-emerald-400 font-semibold`,children:`B`}),`). Ia mendefinisikan fokus di tengah keluasan yang tak terbatas.`]}),(0,V.jsxs)(`div`,{className:`bg-black/50 p-6 rounded-lg border border-zinc-700/50`,children:[(0,V.jsxs)(`h4`,{className:`font-serif-heading font-semibold text-yellow-500 mb-3 flex items-center gap-2`,children:[(0,V.jsx)(yd,{size:16}),` Definisi: Subset (Himpunan Bagian)`]}),(0,V.jsxs)(`div`,{className:`font-mono text-sm bg-zinc-950 p-4 rounded text-zinc-300 mb-3 border border-zinc-800`,children:[(0,V.jsx)(`span`,{className:`text-blue-400`,children:`A`}),` ⊆ `,(0,V.jsx)(`span`,{className:`text-emerald-400`,children:`B`}),` ⟺ (∀x ∈ `,(0,V.jsx)(`span`,{className:`text-blue-400`,children:`A`}),`) x ∈ `,(0,V.jsx)(`span`,{className:`text-emerald-400`,children:`B`})]})]})]}),(0,V.jsx)(Q,{className:`order-1 md:order-2 flex justify-center`,children:(0,V.js ang kandas beberapa bulan lalu. Mereka selalu berdebat tentang cara berpakaian, tentang selera musik, tentang hal-hal kulit luar. Mungkin, pikir Baskara, mereka tidak pernah mencapai titik di mana isi hati mereka saling merengkuh secara timbal balik. Mungkin ada bagian dari dirinya yang tidak ada di dalam kekasihnya, dan sebaliknya, sehingga mereka tidak pernah benar-benar menjadi satu identitas yang utuh. Pengetahuan ini datang padanya bukan sebagai rumus, melainkan sebagai rasa perih yang nyata di dadanya, sebuah kesadaran bahwa kebersamaan mereka hanyalah dua himpunan yang kebetulan beririsan, bukan dua jiwa yang saling menyatu sepenuhnya.`})})]}),(0,V.jsx)(`div`,{className:`max-w-4xl mx-auto relative z-10`,children:(0,V.jsxs)(Q,{children:[(0,V.jsxs)(`div`,{className:`text-center mb-12`,children:[(0,V.jsx)(`h3`,{className:`font-serif-heading text-4xl mb-4 text-zinc-100`,children:`Prinsip Ekstensionalitas`}),(0,V.jsx)(`p`,{className:`font-serif-body text-zinc-500 italic`,children:`"Mereka saling merengkuh secara sempurna. Itulah kesetaraan sejati."`})]}),(0,V.jsxs)(`div`,{className:`grid grid-cols-2 gap-8 md:gap-16 mb-12`,children:[(0,V.jsx)(`div`,{className:`flex flex-col items-center`,children:(0,V.jsxs)(`button`,{onClick:()=>t(!e),className:`w-40 h-40 md:w-56 md:h-56 rounded-xl border-2 transition-all duration-500 relative flex items-center justify-center group

a bukan sekadar tambahan linier pada usianya. Mereka adalah pengganda bagi semesta kemungkinannya. Ia menyadari bahwa selama ini ia melihat hidupnya sebagai satu garis lurus sempit yang harus ia tempuh dengan penuh tekanan, padahal ia berdiri di tengah sebuah ledakan kemungkinan yang tak terbatas.`})}),(0,V.jsx)(Q,{children:(0,V.jsx)(`p`,{children:`Ia merenung tentang bagaimana setiap tindakannya adalah sebuah kepingan yang menambah kompleksitas hidupnya secara eksponensial. Kesadaran itu datang bukan sebagai beban yang menakutkan, melainkan sebagai kebebasan yang membebaskan. Ego-nya yang selama ini terpaku pada hasil akhir yang tunggal mulai runtuh, digantikan oleh rasa syukur atas keluasan yang ditawarkan oleh setiap momen kecil. Ia bukan lagi sekadar elemen tunggal; ia adalah sebuah himpunan kuasa yang terus berkembang.`})})]}),(0,V.jsxs)(`div`,{className:`max-w-5xl mx-auto relative z-10 pt-12`,children:[(0,V.jsx)(Q,{children:(0,V.jsxs)(`div`,{className:`text-center mb-16`,children:[(0,V.jsx)(`h2`,{className:`font-serif-heading text-4xl md:text-5xl text-yellow-500 mb-6`,children:`Ledakan Kemungkinan`}),(0,V.jsxs)(`p`,{className:`font-serif-body text-zinc-400 max-w-2xl mx-auto`,children:[`Simulasi `,(0,V.jsx)(wd,{term:`Semesta Kuasa (Power Set)`,math:`\\mathcal{P}(A) = \\{B \\mid B \\subseteq A\\}`,explanation:`Himpunan Kuasa (Power set) dari A adalah himpunan yang berisi seluruh kemungkinan subset dari A, termasuk himpunan kosong dan A itu sendiri.`}),`. Tambahkan batu untuk melihat bagaimana kemungkinan meluas.`]})]})}),(0,V.jsx)(`div`,{className:`bg-zinc-900/40 backdrop-blur-md rounded-2xl p-8 border border-zinc-800 shadow-2xl`,children:(0,V.jsxs)(`div`,{className:`flex flex-col md:flex-row gap-12 items-start`,children:[(0,V.jsxs)(`div`,{className:`w-full md:w-1/3 flex flex-col gap-6`,children:[(0,V.jsxs)(`div`,{className:`bg-black p-6 rounded-xl border border-zinc-800`,children:[(0,V.jsx)(`h3`,{className:`font-serif-heading text-xl text-zinc-300 mb-4`,childre
